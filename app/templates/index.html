<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ytdl-web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=3) }}">
</head>
<body>
  <div class="bg-glow"></div>
  <div id="toastBox" class="toast-box"></div>
  <div class="shell">
    <header class="topbar card">
      <div class="brand-wrap">
        <div class="logo-dot"></div>
        <div>
          <h1 data-i18n="appTitle">ytdl-web</h1>
          <p data-i18n="appSubtitle">Flask + yt-dlp</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="menuSettingsBtn" class="icon-btn" title="设置" data-i18n="menuSettings" data-i18n-title="menuSettings" style="width: auto; padding: 0 12px; border-radius: 8px; background: rgba(9, 16, 38, 0.62); border: 1px solid rgba(131, 160, 255, 0.24); color: #eaf1ff; font-size: 14px; margin-right: 12px; height: 32px; display: inline-flex; align-items: center;">⚙ 设置</button>
        <div class="lang-wrap" style="width: 140px; margin: 0;">
          <select id="languageSelect" style="padding: 6px 12px; border-radius: 8px; font-size: 13px; height: 32px;"></select>
        </div>
      </div>
    </header>

    <section class="quick-row">
      <article class="quick-card card">
        <div class="quick-title" data-i18n="playlistMode">下载模式</div>
        <div id="statMode" class="quick-value">-</div>
      </article>
      <article class="quick-card card">
        <div class="quick-title" data-i18n="choosePlaylistItems">合集条目</div>
        <div id="statPlaylist" class="quick-value">0/0</div>
      </article>
      <article class="quick-card card">
        <div class="quick-title" data-i18n="taskSection">任务状态</div>
        <div id="statTask" class="quick-value">idle</div>
      </article>
    </section>

    <main class="main card">
      <section id="downloadPanel" class="card panel active">
        <h2 data-i18n="inputSection">链接与信息</h2>
        <div class="row">
          <div class="field grow">
            <label data-i18n="urlLabel">视频链接</label>
            <input id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
          </div>
          <div class="field small">
            <label data-i18n="playlistMode">下载模式</label>
            <select id="playlistMode">
              <option value="false" data-i18n="singleMode">单视频</option>
              <option value="true" data-i18n="playlistModeOption">合集</option>
            </select>
          </div>
        </div>
        <div class="action-row">
          <button id="fetchInfoBtn" class="btn btn-primary" data-i18n="fetchInfo">获取信息</button>
          <button id="choosePlaylistBtn" class="btn btn-secondary" disabled data-i18n="choosePlaylistItems">选择合集条目</button>
        </div>
        <div id="playlistSummary" class="meta-inline"></div>
        <div id="infoStatus" class="status-text"></div>
        <div id="videoMeta" class="meta-box"></div>

        <h2 data-i18n="downloadSection">下载参数</h2>
        <div class="row">
          <div class="field">
            <label data-i18n="format">格式</label>
            <select id="formatSelect"></select>
          </div>
          <div class="field">
            <label data-i18n="audioTrack">音轨</label>
            <select id="audioTrackSelect"></select>
          </div>
          <div class="field">
            <label data-i18n="subtitle">字幕</label>
            <select id="subtitleSelect"></select>
          </div>
        </div>
        <h3 data-i18n="advancedOptions">高级选项</h3>
        <div class="row">
          <div class="field">
            <label data-i18n="outputTemplate">输出模板</label>
            <input id="outputTemplateInput" value="%(title)s.%(ext)s">
          </div>
          <div class="field">
            <label data-i18n="rateLimit">限速</label>
            <input id="rateLimitInput" placeholder="例如: 2M">
          </div>
          <div class="field">
            <label data-i18n="retries">重试次数</label>
            <input id="retriesInput" value="5">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label data-i18n="concurrentFragments">分片并发</label>
            <input id="fragmentsInput" value="8">
          </div>
          <div class="field check-chip"><label><input type="checkbox" id="writeThumbnailCheck"><span data-i18n="writeThumbnail">下载缩略图</span></label></div>
          <div class="field check-chip"><label><input type="checkbox" id="writeDescriptionCheck"><span data-i18n="writeDescription">下载描述</span></label></div>
        </div>
        <div class="row">
          <div class="field check-chip"><label><input type="checkbox" id="writeInfoJsonCheck"><span data-i18n="writeInfoJson">下载infojson</span></label></div>
          <div class="field check-chip"><label><input type="checkbox" id="embedMetadataCheck"><span data-i18n="embedMetadata">写入元数据</span></label></div>
          <div class="field"></div>
        </div>
        <div class="action-row">
          <button id="startDownloadBtn" class="btn btn-success" data-i18n="startDownload">开始下载</button>
          <button id="cancelTaskBtn" class="btn btn-danger" disabled data-i18n="cancelTask">取消任务</button>
          <button id="openTaskModalBtn" class="btn btn-secondary" data-i18n="menuTask">任务</button>
        </div>
      </section>
    </main>
  </div>

  <div id="settingsModal" class="modal-mask hidden">
    <div class="modal card">
      <div class="modal-head">
        <h3 data-i18n="menuSettings">设置</h3>
        <button id="closeSettingsBtn" class="icon-btn">✕</button>
      </div>
      <div class="row">
        <div class="field grow">
          <label data-i18n="downloadPath">下载路径</label>
          <input id="downloadPathInput" readonly>
        </div>
        <div class="field small">
          <label>&nbsp;</label>
          <button id="changePathBtn" class="btn btn-secondary" data-i18n="changePath">更换路径</button>
        </div>
      </div>
      <h3 data-i18n="proxyConfig">代理配置</h3>
      <div class="row">
        <div class="field">
          <label data-i18n="proxyType">代理类型</label>
          <select id="proxyTypeSelect">
            <option value="none">none</option>
            <option value="http">http</option>
            <option value="socks5">socks5</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="proxyHost">代理主机</label>
          <input id="proxyHostInput" value="127.0.0.1">
        </div>
        <div class="field">
          <label data-i18n="proxyPort">代理端口</label>
          <input id="proxyPortInput" value="7890">
        </div>
      </div>
      <div class="action-row">
        <button id="saveSettingsBtn" class="btn btn-primary" data-i18n="saveSettings">保存配置</button>
      </div>
    </div>
  </div>

  <div id="pathModal" class="modal-mask hidden">
    <div class="modal card">
      <div class="modal-head">
        <h3 data-i18n="changePath">更换路径</h3>
        <button id="closePathBtn" class="icon-btn">✕</button>
      </div>
      <div class="field">
        <label data-i18n="downloadPath">下载路径</label>
        <input id="pathDraftInput">
      </div>
      <div class="action-row">
        <button id="applyPathBtn" class="btn btn-success" data-i18n="applyPath">应用路径</button>
      </div>
    </div>
  </div>

  <div id="playlistModal" class="modal-mask hidden">
    <div class="modal card large">
      <div class="modal-head">
        <h3 data-i18n="choosePlaylistItems">选择合集条目</h3>
        <button id="closePlaylistBtn" class="icon-btn">✕</button>
      </div>
      <div class="action-row">
        <button id="selectAllPlaylistBtn" class="btn btn-secondary" data-i18n="selectAll">全选</button>
        <button id="invertPlaylistBtn" class="btn btn-secondary" data-i18n="invertSelection">反选</button>
      </div>
      <div id="playlistItemsWrap" class="playlist-wrap"></div>
      <div class="action-row">
        <button id="applyPlaylistBtn" class="btn btn-success" data-i18n="applySelection">应用选择</button>
      </div>
    </div>
  </div>

  <div id="filesModal" class="modal-mask hidden">
    <div class="modal card large">
      <div class="modal-head">
        <h3 data-i18n="downloadToLocal">下载到本地</h3>
        <button id="closeFilesBtn" class="icon-btn">✕</button>
      </div>
      <div class="action-row">
        <button id="downloadAllFilesBtn" class="btn btn-primary" data-i18n="downloadAllLocal">全部下载到本地</button>
      </div>
      <div id="filesWrap" class="file-wrap"></div>
    </div>
  </div>

  <div id="confirmDownloadModal" class="modal-mask hidden">
    <div class="modal card">
      <div class="modal-head">
        <h3 data-i18n="confirmDownload">确认下载</h3>
        <button id="closeConfirmDownloadBtn" class="icon-btn">✕</button>
      </div>
      <div class="meta-box" data-i18n="confirmDownloadText">将开始下载任务，是否继续？</div>
      <div class="action-row">
        <button id="confirmDownloadBtn" class="btn btn-success" data-i18n="startDownload">开始下载</button>
      </div>
    </div>
  </div>

  <div id="taskModal" class="modal-mask hidden">
    <div class="modal card large">
      <div class="modal-head">
        <h3 data-i18n="taskSection">任务状态</h3>
        <button id="closeTaskBtn" class="icon-btn">✕</button>
      </div>
      <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
      <div id="taskStatus" class="status-text"></div>
      <div id="taskIdText" class="meta-inline"></div>
      <div class="action-row">
        <button id="openFilesBtn" class="btn btn-primary" disabled data-i18n="downloadToLocal">下载到本地</button>
      </div>
      <pre id="logBox" class="log-box"></pre>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/i18n.js', v=5) }}"></script>
  <script src="{{ url_for('static', filename='js/app.js', v=6) }}"></script>
</body>
</html>
